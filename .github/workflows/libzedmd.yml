name: libzedmd
on:
  push:
  pull_request:

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  version:
    name: Detect version
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: version
        run: |
          VERSION_MAJOR=$(grep -Eo "ZEDMD_VERSION_MAJOR\s+[0-9]+" src/ZeDMD.h | grep -Eo "[0-9]+")
          VERSION_MINOR=$(grep -Eo "ZEDMD_VERSION_MINOR\s+[0-9]+" src/ZeDMD.h | grep -Eo "[0-9]+")
          VERSION_PATCH=$(grep -Eo "ZEDMD_VERSION_PATCH\s+[0-9]+" src/ZeDMD.h | grep -Eo "[0-9]+")
          TAG="${VERSION_MAJOR}.${VERSION_MINOR}.${VERSION_PATCH}"
          echo "${TAG}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
      - name: Check git tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          GIT_TAG="${GITHUB_REF#refs/tags/}"
          EXPECTED_TAG="v${{ steps.version.outputs.tag }}"
          if [[ "${GIT_TAG}" != "${EXPECTED_TAG}" ]]; then
            echo "Error: Git tag (${GIT_TAG}) does not match version from ZeDMD.h (v${{ steps.version.outputs.tag }})"
            exit 1
          fi

  build:
    name: Build libzedmd-${{ matrix.platform }}-${{ matrix.arch }}-${{ matrix.type }}
    runs-on: ${{ matrix.os }}
    needs: [ version ]
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-2025, platform: win, arch: x64, type: Release }
          - { os: windows-2025, platform: win, arch: x64, type: Debug }
          - { os: windows-2025, platform: win, arch: x86, type: Release }
          - { os: windows-2025, platform: win-mingw, arch: x64, type: Release }
          - { os: macos-15, platform: macos, arch: arm64, type: Release }
          - { os: macos-15, platform: macos, arch: x64, type: Release }
          - { os: ubuntu-24.04, platform: linux, arch: x64, type: Release }
          - { os: ubuntu-24.04-arm, platform: linux, arch: aarch64, type: Release }
          - { os: ubuntu-24.04, platform: android, arch: arm64-v8a, type: Release }
          - { os: macos-15, platform: ios, arch: arm64, type: Release }
          - { os: macos-15, platform: ios-simulator, arch: arm64, type: Release }
          - { os: macos-15, platform: tvos, arch: arm64, type: Release }
    steps:
      - uses: actions/checkout@v6
      #
      # install dependencies
      #
      - if: (matrix.platform == 'win')
        uses: microsoft/setup-msbuild@v2
      - if: (matrix.platform == 'win-mingw')
        run: |
          /c/msys64/usr/bin/bash.exe -l -c "pacman -S --noconfirm \
            make diffutils autoconf automake libtool \
            mingw-w64-ucrt-x86_64-gcc \
            mingw-w64-ucrt-x86_64-libwinpthread \
            mingw-w64-ucrt-x86_64-cmake"
      - if: (matrix.platform == 'macos' || matrix.platform == 'ios' || matrix.platform == 'ios-simulator' || matrix.platform == 'tvos')
        run: brew install autoconf automake libtool
      - if: (matrix.platform == 'linux' && matrix.arch == 'aarch64')
        run: |
          sudo apt-get update
          sudo apt-get install -y libgpiod-dev
      #
      # build (win)
      #
      - if: (matrix.platform == 'win')
        name: Build (win)
        run: |
          ./platforms/${{ matrix.platform }}/${{ matrix.arch }}/external.sh
          if [[ "${{ matrix.arch }}" == "x64" ]]; then
            cmake \
              -G "Visual Studio 17 2022" \
              -DPLATFORM=${{ matrix.platform }} \
              -DARCH=${{ matrix.arch }} \
              -B build
          else
            cmake \
              -G "Visual Studio 17 2022" \
              -A Win32 \
              -DPLATFORM=${{ matrix.platform }} \
              -DARCH=${{ matrix.arch }} \
              -B build
          fi
          cmake --build build --config ${{ matrix.type }}
      #
      # build (win-mingw)
      #
      - if: (matrix.platform == 'win-mingw')
        name: Build (win-mingw)
        run: |
          CURRENT_DIR="$(pwd)"
          MSYSTEM=UCRT64 /c/msys64/usr/bin/bash.exe -l -c "
            cd \"${CURRENT_DIR}\" &&
            ./platforms/${{ matrix.platform }}/${{ matrix.arch }}/external.sh &&
            cmake \
              -DCMAKE_BUILD_TYPE=${{ matrix.type }} \
              -DPLATFORM=${{ matrix.platform }} \
              -DARCH=${{ matrix.arch }} \
              -B build &&
            cmake --build build -- -j\$(nproc)
          "
      #
      # build (macos)
      #
      - if: (matrix.platform == 'macos')
        name: Build (macos)
        run: |
          ./platforms/${{ matrix.platform }}/${{ matrix.arch }}/external.sh
          cmake \
            -DCMAKE_BUILD_TYPE=${{ matrix.type }} \
            -DPLATFORM=${{ matrix.platform }} \
            -DARCH=${{ matrix.arch }} \
            -B build
          cmake --build build -- -j$(sysctl -n hw.ncpu)
      #
      # build (linux)
      #
      - if: (matrix.platform == 'linux')
        name: Build (linux)
        run: |
          ./platforms/${{ matrix.platform }}/${{ matrix.arch }}/external.sh
          cmake \
            -DCMAKE_BUILD_TYPE=${{ matrix.type }} \
            -DPLATFORM=${{ matrix.platform }} \
            -DARCH=${{ matrix.arch }} \
            -B build
          cmake --build build -- -j$(nproc)
      #
      # build (ios/tvos)
      #
      - if: (matrix.platform == 'ios' || matrix.platform == 'ios-simulator' || matrix.platform == 'tvos')
        name: Build (ios/tvos)
        run: |
          ./platforms/${{ matrix.platform }}/${{ matrix.arch }}/external.sh
          cmake \
            -DCMAKE_BUILD_TYPE=${{ matrix.type }} \
            -DPLATFORM=${{ matrix.platform }} \
            -DARCH=${{ matrix.arch }} \
            -B build
          cmake --build build -- -j$(sysctl -n hw.ncpu)
      #
      # build (android)
      #
      - if: (matrix.platform == 'android')
        name: Build (android)
        run: |
          ./platforms/${{ matrix.platform }}/${{ matrix.arch }}/external.sh
          cmake \
            -DCMAKE_BUILD_TYPE=${{ matrix.type }} \
            -DPLATFORM=${{ matrix.platform }} \
            -DARCH=${{ matrix.arch }} \
            -B build
          cmake --build build -- -j$(nproc)
      #
      # prepare artifacts
      #
      - if: (matrix.platform == 'win')
        name: Prepare artifacts (win)
        run: |
          mkdir tmp
          if [[ "${{ matrix.arch }}" == "x64" ]]; then
            cp build/${{ matrix.type }}/*64.lib tmp
            cp build/${{ matrix.type }}/*64.dll tmp
          else
            cp build/${{ matrix.type }}/*.lib tmp
            cp build/${{ matrix.type }}/*.dll tmp
          fi
          cp build/${{ matrix.type }}/zedmd-client-portable.exe tmp
          cp build/${{ matrix.type }}/zedmd-client.exe tmp
          cp build/${{ matrix.type }}/zedmd-test-portable.exe tmp
          cp build/${{ matrix.type }}/zedmd-test.exe tmp
          if [[ "${{ matrix.type }}" == "Debug" ]]; then
            cp build/${{ matrix.type }}/*.pdb tmp
          fi
          cp -r test tmp/
          cd tmp && 7z a -r ../libzedmd-${{ needs.version.outputs.tag }}-${{ matrix.platform }}-${{ matrix.arch }}-${{ matrix.type }}.zip *
      - if: (matrix.platform == 'win-mingw')
        name: Prepare artifacts (win-mingw)
        run: |
          mkdir tmp
          cp build/*.dll tmp/
          cp build/*.dll.a tmp/
          cp build/zedmd_static.a tmp/
          cp build/*.exe tmp/
          cp -r test tmp/
          cd tmp && 7z a -r ../libzedmd-${{ needs.version.outputs.tag }}-${{ matrix.platform }}-${{ matrix.arch }}-${{ matrix.type }}.zip *
      - if: (matrix.platform == 'macos')
        name: Prepare artifacts (macos)
        run: |
          mkdir tmp
          cp build/libzedmd.a tmp
          cp -a build/*.dylib tmp
          cp build/zedmd-client-portable tmp
          cp build/zedmd-client tmp
          cp build/zedmd-test-portable tmp
          cp build/zedmd-test tmp
          cp -r test tmp/
          cd tmp && tar -czvf ../libzedmd-${{ needs.version.outputs.tag }}-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz *
      - if: (matrix.platform == 'linux')
        name: Prepare artifacts (linux)
        run: |
          mkdir tmp
          cp build/libzedmd.a tmp
          cp -a build/*.so tmp
          cp -a build/*.so.* tmp
          cp build/zedmd-client-portable tmp
          cp build/zedmd-client tmp
          cp build/zedmd-test-portable tmp
          cp build/zedmd-test tmp
          cp -r test tmp/
          cd tmp && tar -czvf ../libzedmd-${{ needs.version.outputs.tag }}-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz *
      - if: (matrix.platform == 'ios' || matrix.platform == 'ios-simulator' || matrix.platform == 'tvos')
        name: Prepare artifacts (ios/tvos)
        run: |
          mkdir tmp
          cp build/libzedmd.a tmp
          cp -a build/*.dylib tmp
          cd tmp && tar -czvf ../libzedmd-${{ needs.version.outputs.tag }}-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz *
      - if: (matrix.platform == 'android')
        name: Prepare artifacts (android)
        run: |
          mkdir tmp
          cp build/libzedmd.a tmp
          cp build/libzedmd.so tmp
          cd tmp && tar -czvf ../libzedmd-${{ needs.version.outputs.tag }}-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz *
      #
      # upload artifacts
      #
      - if: (matrix.platform == 'win' || matrix.platform == 'win-mingw')
        uses: actions/upload-artifact@v7
        with:
          name: libzedmd-${{ needs.version.outputs.tag }}-${{ matrix.platform }}-${{ matrix.arch }}-${{ matrix.type }}.zip
          path: libzedmd-${{ needs.version.outputs.tag }}-${{ matrix.platform }}-${{ matrix.arch }}-${{ matrix.type }}.zip
          archive: false
      - if: (matrix.platform != 'win' && matrix.platform != 'win-mingw')
        uses: actions/upload-artifact@v7
        with:
          name: libzedmd-${{ needs.version.outputs.tag }}-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz
          path: libzedmd-${{ needs.version.outputs.tag }}-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz
          archive: false

  post-build:
    runs-on: macos-15
    needs: [ version, build ]
    name: Build libzedmd-macos
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: libzedmd-${{ needs.version.outputs.tag }}-macos-x64.tar.gz
          skip-decompress: true
      - uses: actions/download-artifact@v8
        with:
          name: libzedmd-${{ needs.version.outputs.tag }}-macos-arm64.tar.gz
          skip-decompress: true
      - name: Combine macos architectures
        run: |
          mkdir macos-x64 macos-arm64
          tar -xzvf libzedmd-${{ needs.version.outputs.tag }}-macos-x64.tar.gz -C macos-x64
          tar -xzvf libzedmd-${{ needs.version.outputs.tag }}-macos-arm64.tar.gz -C macos-arm64
          mkdir tmp
          find macos-arm64 -name "*.dylib" | while read -r file; do
            if [ -L "$file" ]; then
              cp -a "$file" "tmp/"
            elif [ -f "$file" ]; then
              filename=$(basename "$file")
              lipo -create -output "tmp/$filename" \
                "macos-arm64/$filename" \
                "macos-x64/$filename"
            fi
          done
          for filename in zedmd-test zedmd-test-portable zedmd-client zedmd-client-portable; do
            lipo -create -output "tmp/$filename" \
               "macos-arm64/$filename" \
               "macos-x64/$filename"
          done
          cp -r macos-arm64/test tmp
          cd tmp && tar -czvf ../libzedmd-${{ needs.version.outputs.tag }}-macos.tar.gz * && cd ..
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: libzedmd-${{ needs.version.outputs.tag }}-macos.tar.gz
          path: libzedmd-${{ needs.version.outputs.tag }}-macos.tar.gz
          archive: false
      - if: startsWith(github.ref, 'refs/tags/')
        uses: actions/download-artifact@v8
        with:
          path: release
          skip-decompress: true
      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          draft: true
          files: release/**/*
